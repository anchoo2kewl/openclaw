---
- name: Install nginx
  ansible.builtin.apt:
    name: nginx
    state: present

- name: Ensure SSL dir exists
  ansible.builtin.file:
    path: "{{ nginx_ssl_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0750"

- name: Upload origin certificate
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../secrets/claw.biswas.me.crt"
    dest: "{{ nginx_cert_path }}"
    owner: root
    group: root
    mode: "0644"
  notify: reload nginx

- name: Upload origin private key
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../secrets/claw.biswas.me.key"
    dest: "{{ nginx_key_path }}"
    owner: root
    group: root
    mode: "0600"
  notify: reload nginx

- name: Remove default nginx site
  ansible.builtin.file:
    path: /etc/nginx/sites-enabled/default
    state: absent
  notify: reload nginx

- name: Deploy nginx site for openclaw
  ansible.builtin.template:
    src: claw.conf.j2
    dest: /etc/nginx/sites-available/claw.conf
    owner: root
    group: root
    mode: "0644"
  notify: reload nginx

- name: Enable claw site
  ansible.builtin.file:
    src: /etc/nginx/sites-available/claw.conf
    dest: /etc/nginx/sites-enabled/claw.conf
    state: link
  notify: reload nginx

- name: Remove legacy htpasswd file (app now handles auth itself)
  ansible.builtin.file:
    path: /etc/nginx/claw.htpasswd
    state: absent

- name: Ensure DASHBOARD_PASSWORD exists in /opt/openclaw/.env
  ansible.builtin.shell: |
    set -e
    if ! grep -q '^DASHBOARD_PASSWORD=' {{ claw_install_dir }}/.env 2>/dev/null; then
      PW=$(tr -dc 'A-Za-z0-9' </dev/urandom | head -c 24)
      printf 'DASHBOARD_PASSWORD=%s\n' "$PW" >> {{ claw_install_dir }}/.env
      chmod 600 {{ claw_install_dir }}/.env
      chown root:root {{ claw_install_dir }}/.env
      echo "generated"
    else
      echo "kept"
    fi
  register: dashboard_pw_state
  changed_when: "dashboard_pw_state.stdout == 'generated'"

- name: Ensure nginx is enabled + running
  ansible.builtin.service:
    name: nginx
    enabled: true
    state: started
