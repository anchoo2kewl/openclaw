---
- name: Set hostname
  ansible.builtin.hostname:
    name: openclaw

- name: Install base packages
  ansible.builtin.apt:
    name:
      - curl
      - wget
      - git
      - htop
      - ufw
      - fail2ban
      - unattended-upgrades
      - ca-certificates
      - gnupg
      - jq
      - python3-pip
      - python3-venv
      - rsync
      - tzdata
    state: present

- name: Enable unattended-upgrades
  ansible.builtin.copy:
    dest: /etc/apt/apt.conf.d/20auto-upgrades
    content: |
      APT::Periodic::Update-Package-Lists "1";
      APT::Periodic::Unattended-Upgrade "1";
      APT::Periodic::AutocleanInterval "7";
    mode: "0644"

- name: Configure fail2ban for sshd
  ansible.builtin.copy:
    dest: /etc/fail2ban/jail.d/sshd.local
    mode: "0644"
    content: |
      [sshd]
      enabled = true
      port    = ssh
      maxretry = 5
      bantime  = 1h
      findtime = 10m
  notify: restart fail2ban

- name: Reset UFW to defaults
  community.general.ufw:
    state: reset
  register: ufw_reset
  changed_when: false

- name: UFW default deny incoming
  community.general.ufw:
    direction: incoming
    policy: deny

- name: UFW default allow outgoing
  community.general.ufw:
    direction: outgoing
    policy: allow

- name: UFW allow TCP ports
  community.general.ufw:
    rule: allow
    port: "{{ item }}"
    proto: tcp
  loop: "{{ ufw_allowed_tcp }}"

- name: Enable UFW
  community.general.ufw:
    state: enabled

- name: Ensure install dirs exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  loop:
    - "{{ claw_install_dir }}"
    - "{{ claw_install_dir }}/scripts"
    - "{{ claw_install_dir }}/bot"

- name: Ensure workspace and claude-home dirs exist (writable by container uid 10001)
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "10001"
    group: "10001"
    mode: "0750"
  loop:
    - "{{ claw_workspace_dir }}"
    - "{{ claw_claude_home }}"
