---
- name: Sync bot source to host
  ansible.posix.synchronize:
    src: "{{ playbook_dir }}/../../bot/"
    dest: "{{ claw_install_dir }}/bot/"
    delete: true
    rsync_opts:
      - "--exclude=.git"
      - "--exclude=__pycache__"
      - "--exclude=openclaw"

- name: Sync gateway source to host
  ansible.posix.synchronize:
    src: "{{ playbook_dir }}/../../gateway/"
    dest: "{{ claw_install_dir }}/gateway/"
    delete: true
    rsync_opts:
      - "--exclude=.git"

- name: Sync hermes source to host
  ansible.posix.synchronize:
    src: "{{ playbook_dir }}/../../hermes/"
    dest: "{{ claw_install_dir }}/hermes/"
    delete: true
    rsync_opts:
      - "--exclude=.git"
      - "--exclude=__pycache__"
      - "--exclude=node_modules"
      - "--exclude=.venv"

- name: Sync helper scripts
  ansible.posix.synchronize:
    src: "{{ playbook_dir }}/../../scripts/"
    dest: "{{ claw_install_dir }}/scripts/"
    delete: true
    rsync_opts:
      - "--exclude=.git"

- name: Ensure scripts are executable
  ansible.builtin.file:
    path: "{{ claw_install_dir }}/scripts"
    mode: "0755"
    state: directory
    recurse: true

- name: Deploy placeholder .env if missing
  ansible.builtin.copy:
    dest: "{{ claw_install_dir }}/.env"
    mode: "0600"
    owner: root
    group: root
    force: false
    content: |
      # openclaw runtime config
      # Populate these values via scripts/finish-setup.sh
      TELEGRAM_BOT_TOKEN=
      TELEGRAM_ALLOWED_USER_IDS=
      ANTHROPIC_API_KEY=
      CLAUDE_MODEL=claude-sonnet-4-5
      GH_TOKEN=

- name: Ensure data directory exists (bind-mounted into container)
  ansible.builtin.file:
    path: "{{ claw_install_dir }}/data"
    state: directory
    owner: "10001"
    group: "10001"
    mode: "0750"

- name: Ensure gateway state directory exists (bind-mounted into gateway container)
  ansible.builtin.file:
    path: "{{ claw_install_dir }}/gateway-state"
    state: directory
    owner: "10002"
    group: "10002"
    mode: "0750"

- name: Ensure hermes data directory exists (bind-mounted into hermes container)
  ansible.builtin.file:
    path: "{{ claw_install_dir }}/hermes-data"
    state: directory
    owner: "10000"
    group: "10000"
    mode: "0750"

- name: Ensure OPENCLAW_GATEWAY_TOKEN exists in /opt/openclaw/.env
  ansible.builtin.shell: |
    set -e
    if ! grep -q '^OPENCLAW_GATEWAY_TOKEN=' {{ claw_install_dir }}/.env 2>/dev/null; then
      TOKEN=$(tr -dc 'A-Za-z0-9' </dev/urandom | head -c 40)
      printf 'OPENCLAW_GATEWAY_TOKEN=%s\n' "$TOKEN" >> {{ claw_install_dir }}/.env
      chmod 600 {{ claw_install_dir }}/.env
      chown root:root {{ claw_install_dir }}/.env
      echo "generated"
    else
      echo "kept"
    fi
  register: gateway_token_state
  changed_when: "gateway_token_state.stdout == 'generated'"

- name: Read OPENCLAW_GATEWAY_TOKEN back from /opt/openclaw/.env
  ansible.builtin.shell: |
    awk -F= '/^OPENCLAW_GATEWAY_TOKEN=/{print $2}' {{ claw_install_dir }}/.env
  register: gateway_token_value
  changed_when: false
  no_log: true

- name: Read CLAUDE_CODE_OAUTH_TOKEN from /opt/openclaw/.env (may be empty)
  ansible.builtin.shell: |
    awk -F= '/^CLAUDE_CODE_OAUTH_TOKEN=/{print $2; found=1} END {if(!found) print ""}' {{ claw_install_dir }}/.env
  register: claude_oauth_value
  changed_when: false
  no_log: true

- name: Write gateway-only /opt/openclaw/gateway.env
  ansible.builtin.copy:
    dest: "{{ claw_install_dir }}/gateway.env"
    mode: "0600"
    owner: "10002"
    group: "10002"
    content: |
      # Scoped secrets for the openclaw gateway container.
      # - OPENCLAW_GATEWAY_TOKEN: shared secret with the Go bot's reverse
      #   proxy (Authorization: Bearer …) for WS auth.
      # - OPENCLAW_PUBLIC_ORIGINS: CORS origin allowlist for the Control UI.
      # - ANTHROPIC_API_KEY / CLAUDE_CODE_OAUTH_TOKEN: the subscription
      #   OAuth token from `claude setup-token`, re-used here so the
      #   Control UI's Chat pane can actually talk to Claude. The gateway
      #   must NOT contain TELEGRAM_BOT_TOKEN — the Go bot container owns
      #   the Telegram long-poll.
      OPENCLAW_GATEWAY_TOKEN={{ gateway_token_value.stdout }}
      OPENCLAW_GATEWAY_PORT=18789
      OPENCLAW_PUBLIC_ORIGINS=https://{{ claw_hostname }},http://{{ claw_hostname }}
      # Inference auth: same Claude Code subscription OAuth token used by
      # the Telegram bot. Set as ANTHROPIC_API_KEY because openclaw's
      # Anthropic provider passes whatever's there as the x-api-key header,
      # and Anthropic's Messages API accepts the sk-ant-oat01-… token via
      # that header at the cost of a slower first-token (~25-40s, OAuth
      # tokens hit a separate rate-limit pool). Subsequent calls are fast.
      ANTHROPIC_API_KEY={{ claude_oauth_value.stdout }}
      CLAUDE_CODE_OAUTH_TOKEN={{ claude_oauth_value.stdout }}
  no_log: true

- name: Read TELEGRAM_ALLOWED_USER_IDS from /opt/openclaw/.env
  ansible.builtin.shell: |
    awk -F= '/^TELEGRAM_ALLOWED_USER_IDS=/{print $2}' {{ claw_install_dir }}/.env
  register: telegram_user_ids_value
  changed_when: false

- name: Deploy placeholder hermes.env if missing
  ansible.builtin.copy:
    dest: "{{ claw_install_dir }}/hermes.env"
    mode: "0600"
    owner: "10000"
    group: "10000"
    force: false
    content: |
      # Scoped secrets for the hermes-agent container.
      # Populate LLM provider keys here, then restart the stack.
      OPENROUTER_API_KEY=
      # Optional tool API keys
      EXA_API_KEY=
      FIRECRAWL_API_KEY=
      FAL_KEY=
      # Telegram integration — uses a SEPARATE bot from openclaw.
      # Create a new bot via @BotFather (e.g. @hermes_claw_bot).
      # Uses the same Telegram user ID as openclaw for delivery.
      TELEGRAM_BOT_TOKEN=
      TELEGRAM_ALLOWED_USERS={{ telegram_user_ids_value.stdout }}
      TELEGRAM_HOME_CHANNEL={{ telegram_user_ids_value.stdout }}
      TELEGRAM_HOME_CHANNEL_NAME=Anshuman

- name: Seed hermes scripts directory
  ansible.builtin.file:
    path: "{{ claw_install_dir }}/hermes-data/scripts"
    state: directory
    owner: "10000"
    group: "10000"
    mode: "0700"

- name: Deploy HN top 10 cron script
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../../seeds/hermes-scripts/hackernews_top10.py"
    dest: "{{ claw_install_dir }}/hermes-data/scripts/hackernews_top10.py"
    owner: "10000"
    group: "10000"
    mode: "0600"

- name: Seed hermes cron directory
  ansible.builtin.file:
    path: "{{ claw_install_dir }}/hermes-data/cron"
    state: directory
    owner: "10000"
    group: "10000"
    mode: "0700"

- name: Seed hermes cron jobs if absent
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../../seeds/hermes-cron/jobs.json"
    dest: "{{ claw_install_dir }}/hermes-data/cron/jobs.json"
    owner: "10000"
    group: "10000"
    mode: "0600"
    force: false

- name: Seed users.json inside data dir if absent
  ansible.builtin.copy:
    dest: "{{ claw_install_dir }}/data/users.json"
    content: "[]\n"
    mode: "0600"
    owner: "10001"
    group: "10001"
    force: false

- name: Clean up legacy /opt/openclaw/users.json (replaced by data/users.json)
  ansible.builtin.file:
    path: "{{ claw_install_dir }}/users.json"
    state: absent

- name: Check if .env has a telegram token
  ansible.builtin.shell: |
    set -e
    grep -E '^TELEGRAM_BOT_TOKEN=.+' {{ claw_install_dir }}/.env >/dev/null
  register: env_ready
  failed_when: false
  changed_when: false

- name: Build bot image (always)
  ansible.builtin.command:
    cmd: docker compose -f {{ claw_install_dir }}/bot/docker-compose.yml build --no-cache
  changed_when: true

- name: Start bot stack when .env is populated
  ansible.builtin.command:
    cmd: docker compose -f {{ claw_install_dir }}/bot/docker-compose.yml up -d
  when: env_ready.rc == 0
  changed_when: true

- name: Warn when .env is missing secrets
  ansible.builtin.debug:
    msg: |
      /opt/openclaw/.env does not yet contain TELEGRAM_BOT_TOKEN.
      Run: sudo {{ claw_install_dir }}/scripts/finish-setup.sh
      to populate secrets and start the bot.
  when: env_ready.rc != 0
