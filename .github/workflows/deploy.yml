name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: [self-hosted, openclaw]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Sync source to install directory
        run: |
          INSTALL_DIR=/opt/openclaw

          echo "Syncing source files..."
          sudo rsync -a --delete --exclude=.git --exclude=__pycache__ --exclude=openclaw $GITHUB_WORKSPACE/bot/ $INSTALL_DIR/bot/
          sudo rsync -a --delete --exclude=.git $GITHUB_WORKSPACE/gateway/ $INSTALL_DIR/gateway/
          sudo rsync -a --delete --exclude=.git --exclude=node_modules --exclude=.venv --exclude=__pycache__ $GITHUB_WORKSPACE/hermes/ $INSTALL_DIR/hermes/
          sudo rsync -a --delete --exclude=.git $GITHUB_WORKSPACE/scripts/ $INSTALL_DIR/scripts/
          sudo rsync -a --delete $GITHUB_WORKSPACE/seeds/ $INSTALL_DIR/seeds/
          sudo chmod -R 755 $INSTALL_DIR/scripts/

      - name: Build bot image
        run: |
          echo "Building bot image..."
          sudo docker compose -f /opt/openclaw/bot/docker-compose.yml build --no-cache

      - name: Restart containers
        run: |
          echo "Restarting containers..."
          sudo docker compose -f /opt/openclaw/bot/docker-compose.yml up -d

          echo "Waiting for startup..."
          sleep 5
          sudo docker compose -f /opt/openclaw/bot/docker-compose.yml ps

      - name: Health check
        run: |
          echo "Running health check..."
          for i in 1 2 3 4 5; do
            if curl -sf --connect-timeout 5 --max-time 10 http://127.0.0.1:8080/health; then
              echo ""
              echo "Health check passed"
              exit 0
            fi
            echo "Attempt $i failed, retrying in 5s..."
            sleep 5
          done
          echo "Health check failed after 5 attempts"
          exit 1

      - name: Deployment summary
        run: |
          echo "## Deploy Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Server:** claw.biswas.me" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
