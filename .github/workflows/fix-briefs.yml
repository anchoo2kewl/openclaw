name: Fix Briefs & Hermes

on:
  workflow_dispatch:

jobs:
  fix:
    runs-on: [self-hosted, openclaw]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Sync compose file
        run: |
          sudo cp $GITHUB_WORKSPACE/bot/docker-compose.yml /opt/openclaw/bot/docker-compose.yml
          echo "Updated compose:"
          grep command /opt/openclaw/bot/docker-compose.yml

      - name: Recreate hermes with fixed host binding
        run: |
          sudo docker ps -a -q --filter name=hermes | xargs -r sudo docker rm -f 2>/dev/null || true
          sudo docker compose -f /opt/openclaw/bot/docker-compose.yml up -d 2>&1
          echo "Waiting for hermes to start..."
          sleep 15

          for i in 1 2 3 4 5 6; do
            if sudo docker exec openclaw-bot curl -sf --max-time 3 http://hermes:9119/ >/dev/null 2>&1; then
              echo "Hermes responding on attempt $i"
              break
            fi
            echo "Attempt $i: waiting..."
            sleep 5
          done

          echo "=== Status ==="
          sudo docker ps --format "{{.Names}} {{.Status}}"
          echo "=== Hermes logs ==="
          sudo docker logs --tail 5 openclaw-hermes 2>&1
          curl -sf http://127.0.0.1:8080/health && echo " Bot OK"
