name: Fix Briefs & Hermes

on:
  workflow_dispatch:

jobs:
  fix:
    runs-on: [self-hosted, openclaw]

    steps:
      - name: Debug and fix
        run: |
          echo "=== Disk ==="
          df -h / | tail -1

          echo "=== Container status ==="
          sudo docker ps -a --format "{{.Names}} {{.Status}}"

          echo "=== Hermes logs (last 20) ==="
          sudo docker logs --tail 20 openclaw-hermes 2>&1 || echo "no hermes container"

          echo "=== Bot logs (brief-related) ==="
          sudo docker logs openclaw-bot 2>&1 | grep -i "brief" | tail -20

          echo "=== briefs.json ==="
          sudo cat /opt/openclaw/data/briefs.json 2>&1 | head -30 || echo "NO briefs.json"

          echo "=== TELEGRAM_HOME_CHANNEL in .env ==="
          sudo grep TELEGRAM_HOME_CHANNEL /opt/openclaw/.env || echo "NOT SET"

          echo "=== docker-compose hermes command ==="
          grep -A2 command /opt/openclaw/bot/docker-compose.yml

      - name: Fix briefs chat_id if empty
        run: |
          CHAT_ID=$(sudo grep -oP 'TELEGRAM_HOME_CHANNEL=\K.*' /opt/openclaw/.env)
          if [ -z "$CHAT_ID" ]; then
            echo "TELEGRAM_HOME_CHANNEL not set, adding..."
            echo "TELEGRAM_HOME_CHANNEL=8417342395" | sudo tee -a /opt/openclaw/.env
            CHAT_ID="8417342395"
          fi
          echo "Chat ID: $CHAT_ID"

          # Fix empty chat_id in briefs.json
          if [ -f /opt/openclaw/data/briefs.json ]; then
            sudo python3 -c "
          import json
          with open('/opt/openclaw/data/briefs.json') as f:
              briefs = json.load(f)
          changed = False
          for b in briefs:
              if not b.get('chat_id'):
                  b['chat_id'] = '$CHAT_ID'
                  changed = True
                  print(f'Fixed chat_id for {b[\"id\"]}')
          if changed:
              with open('/opt/openclaw/data/briefs.json', 'w') as f:
                  json.dump(briefs, f, indent=2)
              print('briefs.json updated')
          else:
              print('All briefs already have chat_id')
          "
          fi

      - name: Fix hermes container
        run: |
          echo "=== Ensuring hermes command is 'dashboard' ==="
          sudo sed -i 's/\["web",/["dashboard",/' /opt/openclaw/bot/docker-compose.yml
          grep command /opt/openclaw/bot/docker-compose.yml

          echo "=== Force recreating hermes ==="
          sudo docker ps -a -q --filter name=hermes | xargs -r sudo docker rm -f 2>/dev/null || true
          sudo docker compose -f /opt/openclaw/bot/docker-compose.yml up -d 2>&1
          sleep 10

          echo "=== Container status after fix ==="
          sudo docker ps --format "{{.Names}} {{.Status}}"

          echo "=== Hermes logs ==="
          sudo docker logs --tail 10 openclaw-hermes 2>&1

      - name: Verify health
        run: |
          for i in 1 2 3 4 5; do
            if curl -sf --max-time 5 http://127.0.0.1:8080/health; then
              echo ""
              echo "Bot health: OK"
              break
            fi
            sleep 3
          done

          echo "=== Final briefs.json ==="
          sudo cat /opt/openclaw/data/briefs.json 2>&1 | python3 -c "
          import sys,json
          briefs=json.load(sys.stdin)
          for b in briefs:
              print(f'{b[\"id\"]:30s} chat={b.get(\"chat_id\",\"EMPTY\"):15s} enabled={b[\"enabled\"]} last={b.get(\"last_status\",\"never\")}')
          " || echo "Could not parse briefs.json"
