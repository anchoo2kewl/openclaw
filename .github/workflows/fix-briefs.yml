name: Fix Briefs & Hermes

on:
  workflow_dispatch:

jobs:
  fix:
    runs-on: [self-hosted, openclaw]

    steps:
      - name: Fix briefs chat_id and restart
        run: |
          # Fix chat_id in briefs.json using jq
          BRIEFS=/opt/openclaw/data/briefs.json
          if [ -f "$BRIEFS" ]; then
            sudo jq '[ .[] | .chat_id = (if .chat_id == "" or .chat_id == null then "8417342395" else .chat_id end) ]' "$BRIEFS" | sudo tee "${BRIEFS}.tmp" > /dev/null
            sudo mv "${BRIEFS}.tmp" "$BRIEFS"
            sudo chown 10001:10001 "$BRIEFS"
            echo "Fixed briefs.json:"
            sudo jq '.[].chat_id' "$BRIEFS"
          fi

          # Restart bot to pick up fixed briefs
          sudo docker compose -f /opt/openclaw/bot/docker-compose.yml restart bot
          sleep 5

          echo "=== Status ==="
          sudo docker ps --format "{{.Names}} {{.Status}}"
          curl -sf http://127.0.0.1:8080/health && echo " Bot OK"
