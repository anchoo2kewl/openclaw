name: Fix Briefs & Hermes

on:
  workflow_dispatch:

jobs:
  fix:
    runs-on: [self-hosted, openclaw]

    steps:
      - name: Fix briefs chat_id
        run: |
          BRIEFS=/opt/openclaw/data/briefs.json
          echo "=== Before ==="
          sudo python3 -c "
          import json
          with open('$BRIEFS') as f: briefs = json.load(f)
          for b in briefs: print(f\"{b['id']:30s} chat_id='{b.get('chat_id','')}'\")
          "

          echo "=== Fixing ==="
          sudo python3 -c "
          import json
          with open('$BRIEFS') as f: briefs = json.load(f)
          for b in briefs:
              if not b.get('chat_id'):
                  b['chat_id'] = '8417342395'
                  print(f\"Fixed {b['id']}\")
          with open('$BRIEFS', 'w') as f: json.dump(briefs, f, indent=2)
          print('Done')
          "

          echo "=== After ==="
          sudo python3 -c "
          import json
          with open('$BRIEFS') as f: briefs = json.load(f)
          for b in briefs: print(f\"{b['id']:30s} chat_id='{b.get('chat_id','')}'\")
          "

      - name: Restart bot
        run: |
          sudo docker compose -f /opt/openclaw/bot/docker-compose.yml restart bot
          sleep 5
          sudo docker ps --format "{{.Names}} {{.Status}}"
          curl -sf http://127.0.0.1:8080/health && echo " OK"

      - name: Test brief run now
        run: |
          # Wait for bot to be ready
          sleep 3
          # Trigger HN brief via the run-now mechanism by writing a flag
          echo "Briefs should deliver on next cron tick or via dashboard Run Now button"
          echo "All briefs now have chat_id=8417342395"
